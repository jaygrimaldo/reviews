<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  body { font-family: -apple-system, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background: #f0f2f5; }
  .card { background: white; border-radius: 16px; padding: 30px; text-align: center; max-width: 340px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
  h2 { font-size: 20px; color: #1a7a6c; margin: 0 0 10px 0; }
  p { font-size: 14px; color: #555; margin: 0 0 20px 0; }
  a { display: block; background: #1877f2; color: white; text-decoration: none; padding: 14px; border-radius: 10px; font-size: 16px; font-weight: 700; }
</style>
</head>
<body>
<div class="card">
  <h2>Leave a Facebook Review</h2>
  <p>Thank you for taking the time!</p>
  <a href="http://bit.ly/3NbYkoM" rel="noreferrer noopener">Open Facebook Reviews</a>
</div>
</body>
</html>
